name: Deploy OpenAPI docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/openapi.yaml"
      - "docs/package.json"
      - "docs/pnpm-lock.yaml"
      - ".github/workflows/deploy-openapi-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile --ignore-workspace

      - run: pnpm run openapi:build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/openapi

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      # urlを自動で取得
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
