services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: urekoi
      POSTGRES_PASSWORD: urekoi
      POSTGRES_DB: urekoi
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    env_file:
      - apps/api/.env.local
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis

volumes:
  db_data:
  redis_data:
