openapi: 3.0.3
info:
  title: urekoi API
  description: 熟女専門マッチングアプリ urekoi のAPI仕様
  version: 0.1.0
servers:
  - url: http://localhost:8080
    description: ローカル開発環境

tags:
  - name: auth
    x-displayName: 認証
  - name: profile
    x-displayName: プロフィール
  - name: search
    x-displayName: 相手の検索
  - name: likes
    x-displayName: いいね
  - name: matches
    x-displayName: マッチング
  - name: messages
    x-displayName: メッセージ

paths:
  /signup:
    post:
      tags: [auth]
      summary: 新規登録
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignupResponse'
        '400':
          description: バリデーションエラー(email形式・password 8文字未満など)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: メールアドレスの形式が正しくありません
        '409':
          description: email重複
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: このメールアドレスは既に登録されています

  /login:
    post:
      tags: [auth]
      summary: ログイン
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: ログイン成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: パスワードを入力してください
        '401':
          description: email未登録 or パスワード不一致(列挙攻撃防止のため区別せず統一)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: invalid email or password

  /refresh:
    post:
      tags: [auth]
      summary: アクセストークンの再発行
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: 再発行成功(refresh_tokenもローテーションされる)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '400':
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: リフレッシュトークンを入力してください
        '401':
          description: refresh_tokenが無効・期限切れ・失効済み
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: invalid or expired refresh token

  /logout:
    post:
      tags: [auth]
      summary: ログアウト(refresh_tokenを失効させる)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: ログアウト成功
        '400':
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: リフレッシュトークンを入力してください
        '401':
          description: refresh_tokenが無効・期限切れ・失効済み
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: invalid or expired refresh token

  /users/me:
    delete:
      tags: [auth]
      summary: 退会
      responses:
        '200':
          description: 退会成功

  /profile:
    get:
      tags: [profile]
      summary: 自分のプロフィール取得
      responses:
        '200':
          description: 取得成功
    post:
      tags: [profile]
      summary: プロフィール作成
      responses:
        '201':
          description: 作成成功
    put:
      tags: [profile]
      summary: プロフィール更新
      responses:
        '200':
          description: 更新成功

  /profiles:
    get:
      tags: [search]
      summary: 相手一覧取得
      responses:
        '200':
          description: 取得成功

  /profiles/{id}:
    get:
      tags: [search]
      summary: 相手詳細取得
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 取得成功

  /likes:
    post:
      tags: [likes]
      summary: いいねを押す
      responses:
        '201':
          description: いいね成功

  /likes/received:
    get:
      tags: [likes]
      summary: もらったいいねを取得
      responses:
        '200':
          description: 取得成功

  /matches:
    get:
      tags: [matches]
      summary: マッチングした相手の一覧取得
      responses:
        '200':
          description: 取得成功

  /matches/{match_id}/messages:
    parameters:
      - name: match_id
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [messages]
      summary: 特定ユーザーとのメッセージ履歴を取得
      responses:
        '200':
          description: 取得成功
    post:
      tags: [messages]
      summary: 特定ユーザーにメッセージを送る
      responses:
        '201':
          description: 送信成功

components:
  schemas:
    SignupRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: test@example.com
        password:
          type: string
          minLength: 8
          example: password123
    SignupResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        email:
          type: string
          example: test@example.com
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: test@example.com
        password:
          type: string
          example: password123
    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
          example: <JWT>
        refresh_token:
          type: string
          example: <refresh token>
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          example: <refresh token>
    RefreshResponse:
      type: object
      properties:
        access_token:
          type: string
          example: <JWT>
        refresh_token:
          type: string
          example: <new refresh token>
    LogoutRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          example: <refresh token>
    Error:
      type: object
      properties:
        error:
          type: string
