openapi: 3.0.3
info:
  title: urekoi API
  description: 熟女専門マッチングアプリ urekoi のAPI仕様
  version: 0.1.0
servers:
  - url: http://localhost:8080
    description: ローカル開発環境

tags:
  - name: auth
    x-displayName: 認証
  - name: profile
    x-displayName: プロフィール
  - name: search
    x-displayName: 相手の検索
  - name: likes
    x-displayName: いいね
  - name: skips
    x-displayName: スキップ
  - name: matches
    x-displayName: マッチング
  - name: messages
    x-displayName: メッセージ

paths:
  /signup:
    post:
      tags: [auth]
      summary: 新規登録
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignupResponse"
        "400":
          description: バリデーションエラー(email形式・password 8文字未満など)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: メールアドレスの形式が正しくありません
        "409":
          description: email重複
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: このメールアドレスは既に登録されています

  /login:
    post:
      tags: [auth]
      summary: ログイン
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: ログイン成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: パスワードを入力してください
        "401":
          description: email未登録 or パスワード不一致(列挙攻撃防止のため区別せず統一)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: invalid email or password

  /refresh:
    post:
      tags: [auth]
      summary: アクセストークンの再発行
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: 再発行成功(refresh_tokenもローテーションされる)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        "400":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: リフレッシュトークンを入力してください
        "401":
          description: refresh_tokenが無効・期限切れ・失効済み
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: invalid or expired refresh token

  /logout:
    post:
      tags: [auth]
      summary: ログアウト(refresh_tokenを失効させる)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "204":
          description: ログアウト成功
        "400":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: リフレッシュトークンを入力してください
        "401":
          description: refresh_tokenが無効・期限切れ・失効済み
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: invalid or expired refresh token

  /users/me:
    delete:
      tags: [auth]
      summary: 退会
      responses:
        "200":
          description: 退会成功

  /myprofile:
    get:
      tags: [profile]
      summary: 自分のプロフィール取得
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyProfileResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: プロフィール未作成
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: profile not found
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags: [profile]
      summary: プロフィール作成
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MyProfileRequest"
      responses:
        "201":
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyProfileResponse"
        "400":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: プロフィール作成済み
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: profile already exists
        "500":
          $ref: "#/components/responses/InternalServerError"
    put:
      tags: [profile]
      summary: プロフィール更新
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MyProfileRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyProfileResponse"
        "400":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: プロフィール未作成
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: profile not found
        "500":
          $ref: "#/components/responses/InternalServerError"

  /tags:
    get:
      tags: [profile]
      summary: 選択可能なタグ一覧取得
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TagOption"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /search/all:
    get:
      tags: [search]
      summary: 相手一覧取得
      description: 認証済みユーザー自身のプロフィールは結果から除外される
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProfileSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: 登録済みプロフィールが1件もない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: no profiles found
        "500":
          $ref: "#/components/responses/InternalServerError"

  /search/all/partner/{userId}:
    get:
      tags: [search]
      summary: 相手詳細取得
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          description: 相手のUser.ID(Profile.IDではない)
          schema:
            type: integer
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: プロフィールが見つからない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: profile not found
        "500":
          $ref: "#/components/responses/InternalServerError"

  /likes:
    post:
      tags: [likes]
      summary: いいねを送る
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LikeRequest"
      responses:
        "201":
          description: いいね成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LikeResponse"
        "400":
          description: バリデーションエラー(自分自身へのいいねなど)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: 相手が見つからない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: user not found
        "409":
          description: 既にいいね済み
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: already liked
        "500":
          $ref: "#/components/responses/InternalServerError"

  /likes/pending:
    get:
      tags: [likes]
      summary: マッチ済み・スキップ済みを除いた、もらったいいね一覧を取得(ポーリングでの利用を想定)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PendingLikesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /likes/sent:
    get:
      tags: [likes]
      summary: 自分が送ったいいね一覧を取得
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LikeProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /skips:
    post:
      tags: [skips]
      summary: 相手をスキップする
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SkipRequest"
      responses:
        "201":
          description: スキップ成功
        "400":
          description: バリデーションエラー(自分自身へのスキップなど)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: 相手が見つからない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: user not found
        "409":
          description: 既にスキップ済み
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: already skipped
        "500":
          $ref: "#/components/responses/InternalServerError"

  /matches:
    get:
      tags: [matches]
      summary: マッチングした相手の一覧取得
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MatchProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /matches/{match_id}/messages:
    parameters:
      - name: match_id
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [messages]
      summary: 特定ユーザーとのメッセージ履歴を取得
      responses:
        "200":
          description: 取得成功
    post:
      tags: [messages]
      summary: 特定ユーザーにメッセージを送る
      responses:
        "201":
          description: 送信成功

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    Unauthorized:
      description: 未認証
    InternalServerError:
      description: サーバー内部エラー
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    SignupRequest:
      type: object
      required: [email, password, gender, birthdate, nickname, prefecture_code]
      properties:
        email:
          type: string
          format: email
          example: test@example.com
        password:
          type: string
          minLength: 8
          example: password123
        gender:
          type: string
          enum: [male, female]
          example: female
        birthdate:
          type: string
          format: date
          example: "1990-01-01"
        nickname:
          type: string
          example: たろう
        prefecture_code:
          type: integer
          example: 13
    SignupResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        email:
          type: string
          example: test@example.com
        access_token:
          type: string
          example: <JWT>
        refresh_token:
          type: string
          example: <refresh token>
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: test@example.com
        password:
          type: string
          example: password123
    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
          example: <JWT>
        refresh_token:
          type: string
          example: <refresh token>
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          example: <refresh token>
    RefreshResponse:
      type: object
      properties:
        access_token:
          type: string
          example: <JWT>
        refresh_token:
          type: string
          example: <new refresh token>
    LogoutRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          example: <refresh token>
    ProfileSummary:
      type: object
      properties:
        user_id:
          type: integer
          format: int64
          example: 1
        nickname:
          type: string
          example: たろう
        age:
          type: integer
          example: 42
        prefecture:
          type: string
          example: 東京都
        image:
          type: string
          example: /placeholder.svg
        is_new:
          type: boolean
          example: true
        online:
          type: string
          example: online
    LikeProfile:
      type: object
      properties:
        user_id:
          type: integer
          format: int64
          example: 1
        nickname:
          type: string
          example: たろう
        age:
          type: integer
          example: 42
        prefecture:
          type: string
          example: 東京都
        online:
          type: string
          example: online
        photos:
          type: array
          items:
            type: string
          example: [/placeholder.svg]
    ProfileDetail:
      type: object
      properties:
        user_id:
          type: integer
          format: int64
          example: 1
        nickname:
          type: string
          example: たろう
        age:
          type: integer
          example: 42
        prefecture:
          type: string
          example: 東京都
        bio:
          type: string
          example: よろしくお願いします
        is_new:
          type: boolean
          example: true
        online:
          type: string
          example: online
        images:
          type: array
          items:
            type: string
          example: [/placeholder.svg]
        tags:
          type: array
          items:
            $ref: "#/components/schemas/TagSummary"
        already_liked:
          type: boolean
          description: 閲覧者が既にこの相手にいいね済みか
          example: false
    TagSummary:
      type: object
      properties:
        label:
          type: string
          example: 甘いもの大好き
        category:
          type: string
          example: グルメ・お酒
        image_url:
          type: string
          example: /tags/sweets.png
    TagOption:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        label:
          type: string
          example: 甘いもの大好き
        category:
          type: string
          example: グルメ・お酒
    LikeRequest:
      type: object
      required: [to_user_id]
      properties:
        to_user_id:
          type: integer
          format: int64
          example: 1
    LikeResponse:
      type: object
      properties:
        matched:
          type: boolean
          description: 相互いいねによりマッチが成立したか
          example: false
    PendingLikesResponse:
      type: object
      properties:
        total:
          type: integer
          example: 1
        profiles:
          type: array
          items:
            $ref: "#/components/schemas/LikeProfile"
    SkipRequest:
      type: object
      required: [to_user_id]
      properties:
        to_user_id:
          type: integer
          format: int64
          example: 1
    MatchProfile:
      type: object
      properties:
        user_id:
          type: integer
          format: int64
          example: 1
        nickname:
          type: string
          example: たろう
        age:
          type: integer
          example: 42
        prefecture:
          type: string
          example: 東京都
        image:
          type: string
          example: /placeholder.svg
    MyProfileRequest:
      type: object
      required: [nickname, age, prefecture_code]
      properties:
        nickname:
          type: string
          example: たろう
        age:
          type: integer
          example: 42
        prefecture_code:
          type: integer
          example: 13
        bio:
          type: string
          example: よろしくお願いします
        occupation:
          type: string
          example: エンジニア
        hometown:
          type: string
          example: 東京
        blood_type:
          type: string
          example: A型
        mbti:
          type: string
          example: INTJ
        body_type:
          type: string
          example: 普通
        education:
          type: string
          example: 大学卒
        holiday:
          type: string
          example: 土日
        alcohol:
          type: string
          example: 時々飲む
        smoking:
          type: string
          example: 吸わない
        height_cm:
          type: integer
          example: 175
        tag_ids:
          type: array
          items:
            type: integer
          example: [1, 2, 3]
    MyProfileResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        nickname:
          type: string
          example: たろう
        age:
          type: integer
          example: 42
        prefecture_code:
          type: integer
          example: 13
        prefecture:
          type: string
          example: 東京都
        bio:
          type: string
          example: よろしくお願いします
        occupation:
          type: string
          example: エンジニア
        hometown:
          type: string
          example: 東京
        blood_type:
          type: string
          example: A型
        mbti:
          type: string
          example: INTJ
        body_type:
          type: string
          example: 普通
        education:
          type: string
          example: 大学卒
        holiday:
          type: string
          example: 土日
        alcohol:
          type: string
          example: 時々飲む
        smoking:
          type: string
          example: 吸わない
        height_cm:
          type: integer
          example: 175
        tag_ids:
          type: array
          items:
            type: integer
          example: [1, 2, 3]
    Error:
      type: object
      properties:
        error:
          type: string
